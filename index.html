    ===========================================================
    DỰ ÁN: HỖ TRỢ GIAO HÀNG (Đoạn 001)
    PHIÊN BẢN: 4.5 (Chống lệch ghim - High Accuracy)
    PHÁT TRIỂN BỞI: [YISINORA AKA BÙI ĐỨC ANH]
    MÔ TẢ: Tự động sao chép vị trí + Sao chép số điện thoại.
    BẢN QUYỀN © 8-3-2026 THUỘC VỀ [YISINORA AKA BÙI ĐỨC ANH]. 
    ===========================================================
-->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hỗ trợ giao hàng v4.5</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f0f2f5; 
            padding: 15px; 
            color: #333; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .card { 
            max-width: 450px; 
            width: 100%;
            margin: auto; 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.1); 
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        h2 { text-align: center; color: #1a73e8; margin-top: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .step { 
            margin: 15px 0; 
            padding: 15px; 
            border-radius: 15px; 
            background: #f8f9fa; 
            border: 1px solid #e0e0e0; 
            box-sizing: border-box;
        }

        .step-title { 
            font-weight: bold; 
            margin-bottom: 12px; 
            display: block; 
            color: #1a73e8; 
            font-size: 16px; 
        }

        .btn-action { 
            width: 100%; 
            padding: 14px 10px; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            color: white;
            transition: 0.2s;
            text-decoration: none;
            box-sizing: border-box;
            text-align: center;
        }

        .btn-geo { background: #28a745; }
        .btn-zalo { background: #0068FF; }
        .btn-msg { background: #0084FF; }
        
        .btn-outline { 
            background: #fff; 
            border: 2px solid #ddd; 
            color: #555; 
            font-size: 13px; 
            margin-top: 15px; 
            white-space: normal;
            height: auto;
            line-height: 1.4;
        }

        .btn-action:active { transform: scale(0.98); }
        .btn-action:disabled { background: #ccc !important; cursor: not-allowed; }

        .accuracy-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 5px;
            display: inline-block;
        }
        .acc-high { background: #e6f4ea; color: #137333; }
        .acc-low { background: #fce8e6; color: #c5221f; }

        .phone-note-container {
            margin-top: 20px;
            padding: 12px;
            background: #fff8f8;
            border: 1px dashed #ffdde0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
        }
        
        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 12px;
            position: fixed;
            z-index: 2000;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 3.5s; }

        @keyframes fadein { from {top: 0; opacity: 0;} to {top: 20px; opacity: 1;} }
        @keyframes fadeout { from {top: 20px; opacity: 1;} to {top: 0; opacity: 0;} }

        .driver-badge {
            background: #e6f4ea;
            color: #137333;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center;">
        <span class="driver-badge" id="driverInfo">Tài xế: Đang tải...</span>
    </div>
    <h2>🚚 HỖ TRỢ GIAO HÀNG</h2>

    <div class="step">
        <span class="step-title">Bước 1: Xác định vị trí của bạn</span>
        <button class="btn-action btn-geo" onclick="getLocation()" id="geoBtn">
            📍 BẤM ĐỂ LẤY VỊ TRÍ
        </button>
        <p id="status" style="margin-top:10px; font-size: 13px; text-align: center; font-weight: bold; color: #666;"></p>
        <div id="accInfo" style="text-align: center;"></div>
    </div>

    <div id="step2" class="step" style="display: none; border-color: #0068FF;">
        <span class="step-title">Bước 2: Gửi cho tài xế</span>
        
        <div style="font-size: 14px; margin-bottom: 10px;">
            🚀 <b>ĐÃ CHÉP VỊ TRÍ!</b><br>
            Mở ứng dụng bên dưới, <b>Chạm giữ</b> vào ô chat và chọn <b>Dán</b>.
        </div>

        <div id="appSelector">
            <button class="btn-action btn-zalo" onclick="sendDirect('zalo')">
                💬 Gửi qua Zalo
            </button>
            <button class="btn-action btn-msg" onclick="sendDirect('msg')">
                🌀 Gửi qua Messenger
            </button>
        </div>

        <a id="viewMapBtn" href="#" target="_blank" class="btn-action btn-outline">
            🗺️ Kiểm tra lại ghim trên bản đồ
        </a>

        <div class="phone-note-container" id="copyPhoneBtn">
            <span style="font-size: 14px; color: #d32f2f; font-weight: 700;" id="phoneMainTxt">💡 Tìm số zalo...</span><br>
            <span style="font-size: 12px; color: #999;">Bấm để copy số</span>
        </div>
    </div>
</div>

<div id="toast">Thông báo</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pZalo = urlParams.get('zalo') || "886989784646";
    const pMsg = urlParams.get('msg') || "Anh301003";
    const pName = urlParams.get('name') || "Bùi Đức Anh";
    const phoneToCopy = pZalo.startsWith('+') || pZalo.startsWith('0') ? pZalo : '+' + pZalo;
    
    let savedMapLink = "";

    window.onload = () => {
        document.getElementById('driverInfo').innerText = `Tài xế: ${pName}`;
        document.getElementById('phoneMainTxt').innerText = `💡 Lưu ý: Tìm số ${phoneToCopy} nếu lỗi`;
    };

    function showToast(message) {
        const x = document.getElementById("toast");
        x.innerHTML = message;
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 4000);
    }

    async function copyToClipboard(text) {
        if (!text) return false;
        try {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            const res = document.execCommand('copy');
            document.body.removeChild(textArea);
            return res;
        } catch (err) { return false; }
    }

    function getLocation() {
        const status = document.getElementById('status');
        const accInfo = document.getElementById('accInfo');
        const geoBtn = document.getElementById('geoBtn');
        
        status.innerHTML = "🛰️ Đang bắt tín hiệu vệ tinh...<br><span style='font-size:11px; font-weight:normal;'>Hãy đứng ở chỗ thoáng để ghim không bị lệch.</span>";
        accInfo.innerHTML = "";
        geoBtn.disabled = true;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = Math.round(position.coords.accuracy);

                    // LOGIC KIỂM TRA ĐỘ CHÍNH XÁC (Dưới 40m)
                    if (accuracy > 40) {
                        accInfo.innerHTML = `<span class="accuracy-badge acc-low">⚠️ Sai số: ${accuracy}m (Quá lớn)</span><br><small style="color:red">Vị trí hiện tại có thể bị lệch. Hãy thử đứng gần cửa sổ hoặc ngoài trời rồi bấm lại.</small>`;
                        geoBtn.disabled = false;
                        geoBtn.innerText = "🔄 LẤY LẠI VỊ TRÍ CHUẨN";
                    } else {
                        accInfo.innerHTML = `<span class="accuracy-badge acc-high">✅ Vị trí chuẩn (Sai số: ${accuracy}m)</span>`;
                        geoBtn.innerText = "📍 ĐÃ CÓ VỊ TRÍ CHUẨN";
                    }

                    // Cấu trúc link ép ghim Google Maps không bị nhảy địa chỉ
                    savedMapLink = `https://www.google.com/maps?q=${lat},${lng}&z=19`;
                    
                    status.innerHTML = "<span style='color: #28a745;'>✅ Đã xác định tọa độ!</span>";
                    
                    copyToClipboard(savedMapLink).then(() => {
                        showToast("✅ Đã tự động chép link vị trí!");
                        document.getElementById('viewMapBtn').href = savedMapLink;
                        document.getElementById('step2').style.display = "block";
                        setTimeout(() => { document.getElementById('step2').scrollIntoView({ behavior: 'smooth' }); }, 300);
                    });
                },
                (err) => {
                    status.innerHTML = "<span style='color:red;'>❌ Lỗi GPS. Hãy bật định vị và cấp quyền cho trình duyệt.</span>";
                    geoBtn.disabled = false;
                },
                { 
                    enableHighAccuracy: true, 
                    timeout: 15000, 
                    maximumAge: 0 
                }
            );
        }
    }

    async function sendDirect(type) {
        if (!savedMapLink) return;
        await copyToClipboard(savedMapLink);
        showToast("🚀 Đang chuyển sang App...");
        const targetUrl = (type === 'zalo') ? `https://zalo.me/${pZalo.replace('+', '')}` : `https://m.me/${pMsg}`;
        setTimeout(() => { window.location.href = targetUrl; }, 300);
    }

    document.getElementById('copyPhoneBtn').addEventListener('click', function() {
        copyToClipboard(phoneToCopy).then(() => showToast("✅ Đã copy số điện thoại!"));
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Thêm các thẻ Meta chuẩn để hệ thống Zalo đánh giá độ tin cậy của trang -->
    <meta name="description" content="Ứng dụng hỗ trợ tài xế giao hàng và chia sẻ vị trí nhanh chóng, an toàn.">
    <meta property="og:title" content="Hỗ trợ Giao hàng Nhanh">
    <meta property="og:description" content="Chia sẻ vị trí an toàn cho tài xế của bạn.">
    <meta property="og:type" content="website">
    
    <title>Hỗ trợ giao hàng v2.8</title>
    <style>
        :root { --primary: #1a73e8; --success: #00c853; --zalo: #0068FF; --msg: #0084FF; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); padding: 15px; color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
        .card { max-width: 450px; width: 100%; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); box-sizing: border-box; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 22px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .secure-badge { background: #e6f4ea; color: #137333; font-size: 11px; padding: 4px 8px; border-radius: 12px; display: inline-flex; align-items: center; gap: 4px; justify-content: center; margin-bottom: 15px; width: fit-content; margin-left: auto; margin-right: auto; }
        .box-p { margin: 15px 0; padding: 18px; border-radius: 12px; background: #fafafa; border: 1px solid #eaeaea; }
        .lbl-s { font-weight: 600; margin-bottom: 12px; display: block; color: var(--primary); font-size: 16px; }
        .act-b { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; box-sizing: border-box; margin-top: 8px; color: white; }
        .act-b:active { transform: scale(0.98); }
        .bg-g { background: var(--success); }
        .bg-z { background: var(--zalo); }
        .bg-m { background: var(--msg); }
        .bg-o { background: #fff; border: 1.5px solid #ddd; color: #555; }
        .info-i { background: #e7f3ff; color: #0c5460; padding: 12px; border-radius: 8px; font-size: 13.5px; margin-top: 15px; border: 1px solid #bee5eb; line-height: 1.5; display: none; text-align: center; }
        #toast-m { visibility: hidden; min-width: 250px; background-color: rgba(0,0,0,0.8); color: #fff; text-align: center; border-radius: 8px; padding: 14px; position: fixed; z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 14px; backdrop-filter: blur(4px); }
        #toast-m.on { visibility: visible; animation: fadein 0.4s, fadeout 0.4s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .cp-r { margin-top: 20px; font-size: 12px; color: #999; text-align: center; padding-bottom: 20px; }
        #final-step { display: none; border: 1.5px dashed var(--success); background: #f8fff9; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align: center;">
        <div class="secure-badge">🔒 Kết nối an toàn</div>
    </div>
    <h2>🚚 HỖ TRỢ GIAO HÀNG</h2>
    
    <div class="box-p">
        <span class="lbl-s">1. Lấy tọa độ giao hàng</span>
        <button class="act-b bg-g" id="btnGetLocation">📍 XÁC NHẬN VỊ TRÍ</button>
        <p id="locationStatus" style="margin-top:10px; font-size: 13px; text-align: center; font-weight: 500; color: #666;"></p>
    </div>

    <div id="boxPrepare" class="box-p" style="display: none;">
        <span class="lbl-s">2. Chuẩn bị dữ liệu</span>
        <button class="act-b bg-z" id="btnCopyData">📋 LƯU VỊ TRÍ & TIẾP TỤC</button>
        <div id="guideText" class="info-i">
            ✅ <b>Lưu thành công!</b><br>Tiếp tục bước 3 bên dưới.
        </div>
    </div>

    <div id="final-step" class="box-p">
        <span class="lbl-s" style="color: var(--success);">3. Gửi cho tài xế</span>
        <p style="font-size: 13px; color: #555; margin-top: 0; margin-bottom: 12px; text-align: center;">Vui lòng chọn ứng dụng để gửi định vị:</p>
        
        <a id="linkZalo" target="_blank" class="act-b bg-g">💬 MỞ ỨNG DỤNG ZALO</a>
        <a id="linkMsg" target="_blank" class="act-b bg-m">🌀 MỞ MESSENGER</a>
    </div>

    <button id="btnViewMap" class="act-b bg-o" style="display: none; margin-top: 10px;">🗺️ Xem trên Google Maps</button>
</div>

<div id="toast-m">Thông báo</div>
<div class="cp-r">Phiên bản 2.8 (Safe Verified)<br>© 2026 Yisinora (Bùi Đức Anh).</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let savedLocationUrl = "";
        const targetZaloPhone = "886989784646";
        const targetFbId = "Anh301003";

        const elements = {
            btnGetLocation: document.getElementById('btnGetLocation'),
            statusText: document.getElementById('locationStatus'),
            boxPrepare: document.getElementById('boxPrepare'),
            btnCopyData: document.getElementById('btnCopyData'),
            guideText: document.getElementById('guideText'),
            finalStep: document.getElementById('final-step'),
            linkZalo: document.getElementById('linkZalo'),
            linkMsg: document.getElementById('linkMsg'),
            btnViewMap: document.getElementById('btnViewMap'),
            toast: document.getElementById('toast-m')
        };

        function showNotification(message) {
            elements.toast.innerHTML = message;
            elements.toast.className = "on";
            setTimeout(() => { elements.toast.className = ""; }, 2900);
        }

        async function copyToClipboardFallback(text) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    return true;
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-999999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    textArea.remove();
                    return successful;
                }
            } catch (err) {
                return false;
            }
        }

        elements.btnGetLocation.addEventListener('click', function() {
            elements.statusText.innerText = "Đang kết nối GPS...";
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        savedLocationUrl = "Vị trí của tôi: https://www.google.com/maps?q=" + lat + "," + lng;
                        
                        elements.statusText.innerHTML = "<span style='color:#00c853'>Đã lấy vị trí thành công!</span>";
                        elements.boxPrepare.style.display = "block";
                        elements.btnViewMap.style.display = "flex";
                        showNotification("Đã cập nhật vị trí.");
                    },
                    function(error) {
                        elements.statusText.innerText = "Vui lòng cấp quyền truy cập vị trí (GPS).";
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            } else {
                elements.statusText.innerText = "Trình duyệt không hỗ trợ định vị.";
            }
        });

        elements.btnCopyData.addEventListener('click', async function() {
            if (!savedLocationUrl) return;
            
            const isCopied = await copyToClipboardFallback(savedLocationUrl);
            if (isCopied) {
                elements.guideText.style.display = "block";
                elements.finalStep.style.display = "block";
                
                elements.linkZalo.href = "https://zalo.me/" + targetZaloPhone;
                elements.linkMsg.href = "https://m.me/" + targetFbId;

                showNotification("Đã lưu vị trí vào bảng tạm!");
                this.style.opacity = "0.5";
            } else {
                showNotification("Có lỗi xảy ra, vui lòng thử lại.");
            }
        });

        elements.btnViewMap.addEventListener('click', function() {
            if (savedLocationUrl) {
                const mapUrl = savedLocationUrl.replace("Vị trí của tôi: ", "");
                window.open(mapUrl, '_blank');
            }
        });
    });
</script>
</body>
</html>
